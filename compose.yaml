services:
  academy-file:
    image: postgres:16
    environment:
      POSTGRES_DB: academy-file
      POSTGRES_PASSWORD: 12345678
      POSTGRES_USER: postgres
    ports:
      - '5435:5434'
    command: -p 5434

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5052:80'
    depends_on:
      - academy-file

      